<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TechGear gear icon">
  <defs>
    <linearGradient id="tg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C3E50" />
      <stop offset="100%" stop-color="#3498DB" />
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="46" fill="url(#tg-gradient)"/>
  <circle cx="60" cy="60" r="26" fill="#ECF0F1"/>
  <circle cx="60" cy="60" r="10" fill="#2C3E50"/>

  <!-- Gear teeth -->
  <g fill="#2C3E50">
    <rect x="56" y="6" width="8" height="14" rx="2"/>
    <rect x="56" y="100" width="8" height="14" rx="2"/>
    <rect x="6" y="56" width="14" height="8" rx="2"/>
    <rect x="100" y="56" width="14" height="8" rx="2"/>
    <rect x="20" y="20" width="12" height="8" rx="2" transform="rotate(-45 26 24)"/>
    <rect x="88" y="20" width="12" height="8" rx="2" transform="rotate(45 94 24)"/>
    <rect x="20" y="88" width="12" height="8" rx="2" transform="rotate(45 26 92)"/>
    <rect x="88" y="88" width="12" height="8" rx="2" transform="rotate(-45 94 92)"/>
  </g>

  <!-- Chip lines -->
  <g stroke="#ECF0F1" stroke-width="3" stroke-linecap="round">
    <line x1="60" y1="18" x2="60" y2="34" />
    <line x1="60" y1="86" x2="60" y2="102" />
    <line x1="18" y1="60" x2="34" y2="60" />
    <line x1="86" y1="60" x2="102" y2="60" />
  </g>
</svg>
